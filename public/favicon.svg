<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lines -->
  <line x1="45" y1="8"  x2="30" y2="8"  stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="45" y1="8"  x2="45" y2="18" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="45" y1="18" x2="45" y2="28" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="45" y1="28" x2="45" y2="38" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="45" y1="38" x2="35" y2="48" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="35" y1="48" x2="20" y2="45" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="20" y1="45" x2="15" y2="35" stroke="url(#nodeGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <!-- Cross connections -->
  <line x1="30" y1="8"  x2="15" y2="35" stroke="#AAAAAA" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="45" y1="18" x2="20" y2="45" stroke="#AAAAAA" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Nodes -->
  <circle cx="45" cy="8"  r="4"   fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="30" cy="8"  r="3.5" fill="#AAAAAA"         filter="url(#glow)"/>
  <circle cx="45" cy="18" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="45" cy="28" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="45" cy="38" r="4"   fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="35" cy="48" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="20" cy="45" r="4"   fill="#AAAAAA"         filter="url(#glow)"/>
  <circle cx="15" cy="35" r="3.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
</svg>
